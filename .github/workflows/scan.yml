name: DS波段扫描

# 定时触发已全面迁移至 Cloudflare Worker 内网服务绑定通道（Master-Scheduler ➔ ds-scan-trigger）
# 本工作流支持：CF Worker 自动远程唤醒 / 手机 GitHub App 手动触发
on:
  workflow_dispatch:           # 手动触发入口
  repository_dispatch:         # ✨ 新增：对接项目二 Worker 的内网穿透安全触发
    types: [scan]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境并启用缓存  # ✨ 新增：规范 Python 环境并开启依赖缓存
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # 第二次运行起，下面这堆沉重的重型库将秒级闪电加载

      - name: 安装Python依赖
        run: pip install requests pandas akshare lxml beautifulsoup4

      - name: 运行扫描并保存报告
        run: |
          python automation/ds_scanner.py
          echo "--- report.txt 前20行 ---"
          head -20 report.txt
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Gemini自动分析并写入看板
        run: python automation/generate_dashboard.py
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # 失败不阻塞后续Bark推送（report原文优先）
        continue-on-error: true

      - name: Bark推送报告
        run: python automation/send_report.py
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
