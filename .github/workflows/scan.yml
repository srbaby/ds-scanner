name: DS波段扫描

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python依赖
        run: pip install requests pandas akshare lxml beautifulsoup4

      - name: 运行扫描并保存报告
        run: python ds_scanner.py > report.txt 2>&1

      - name: 发送报告邮件
        run: python send_report.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
