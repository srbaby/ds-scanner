name: X-Plan量化观察

# 本地路径去掉了 .github 的点，方便云盘同步；同步到 GitHub 时仍对应 .github/workflows/observe.yml
on:
  workflow_dispatch:
    inputs:
      observe_date:
        description: "观察日期 YYYY-MM-DD；留空则使用当天"
        required: false
        default: ""
  repository_dispatch:
    types: [observe]

jobs:
  observe:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境并启用缓存
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: |
            automation/observe.py

      - name: 安装Python依赖
        run: pip install requests

      - name: 运行在线观察任务
        run: |
          if [ -n "${{ github.event.inputs.observe_date }}" ]; then
            python automation/observe.py --date "${{ github.event.inputs.observe_date }}"
          else
            python automation/observe.py
          fi
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
