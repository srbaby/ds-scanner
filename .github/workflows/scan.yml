name: X-Plan波段扫描

# 定时触发已全面迁移至 Cloudflare Worker 内网服务绑定通道（Master-Scheduler ➔ ds-scan-trigger）
# 本工作流支持：CF Worker 自动远程唤醒 / 手机 GitHub App 手动触发
on:
  workflow_dispatch:           # 手动触发入口
  repository_dispatch:         # ✨ 新增：对接项目二 Worker 的内网穿透安全触发
    types: [scan]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境并启用缓存
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          # ✨ 新增：让缓存插件去扫描你的脚本文件，完美适配你的无依赖文件架构
          cache-dependency-path: |
            automation/ds_scanner.py
            automation/ai_review.py
            automation/generate_dashboard.py
            automation/send_report.py
            automation/versioning.py
            VERSION.json

      - name: 安装Python依赖
        run: pip install requests pandas akshare lxml beautifulsoup4

      - name: 运行v3.0回归测试
        run: |
          node js/test_app.js
          PYTHONPATH=automation python -m unittest \
            automation/test_send_report.py \
            automation/test_versioning.py \
            automation/test_observe.py

      - name: 运行扫描并保存报告
        run: |
          python automation/ds_scanner.py
          echo "--- report.txt 前20行 ---"
          head -20 report.txt
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: DeepSeek Flash分析并写入看板
        run: python automation/generate_dashboard.py
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          DEEPSEEK_MAX_TOKENS: "8192"
          DEEPSEEK_RETRIES: "1"
          DEEPSEEK_RETRY_SLEEP_SECONDS: "20"
        # 失败不阻塞后续Bark摘要；摘要会明确提示AI失败并跳转看板。
        continue-on-error: true

      - name: Bark推送报告
        run: python automation/send_report.py
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_KEY_WIFE: ${{ secrets.BARK_KEY_WIFE }}
