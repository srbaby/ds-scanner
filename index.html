<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>持仓管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --danger: #ff4757;
    --warn: #ffa502;
    --text: #e8f0fe;
    --text2: #7a8ba8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* 顶部栏 */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .topbar-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }
  .topbar-status.ok { color: var(--accent2); }
  .topbar-status.err { color: var(--danger); }

  /* 认证区 */
  #auth-screen {
    padding: 40px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 420px;
    margin: 0 auto;
  }
  .auth-logo {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 8px;
  }
  .auth-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }
  .auth-sub {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
    line-height: 1.6;
  }

  /* 表单元素 */
  .field-label {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    font-family: var(--mono);
  }
  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--accent);
  }
  input::placeholder { color: var(--text2); }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:active { opacity: 0.8; transform: scale(0.98); }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }

  /* 主界面 */
  #main-screen { display: none; }

  /* 资产概览 */
  .overview {
    background: linear-gradient(135deg, #0d1f3c 0%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
  }
  .overview-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .overview-cash {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.02em;
  }
  .overview-cash-edit {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .cash-edit-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
  }
  .cash-input-row {
    display: none;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .cash-input-row input {
    font-size: 18px;
    padding: 8px 12px;
  }
  .cash-input-row .btn {
    width: auto;
    padding: 8px 16px;
    white-space: nowrap;
  }
  .overview-sub {
    margin-top: 12px;
    display: flex;
    gap: 20px;
  }
  .overview-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .overview-stat-label {
    font-size: 10px;
    color: var(--text2);
    font-family: var(--mono);
  }
  .overview-stat-val {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* 持仓列表 */
  .section-header {
    padding: 16px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.12em;
  }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* 持仓卡片 */
  .holding-card {
    margin: 0 12px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .holding-card:active { border-color: var(--accent); }
  .card-main {
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,212,255,0.08);
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    min-width: 56px;
    text-align: center;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
  }
  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-btn {
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .card-btn-reduce {
    background: rgba(255,165,2,0.12);
    color: var(--warn);
    border: 1px solid rgba(255,165,2,0.25);
  }
  .card-btn-close {
    background: rgba(255,71,87,0.1);
    color: var(--danger);
    border: 1px solid rgba(255,71,87,0.2);
  }

  /* 展开编辑区 */
  .card-edit {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    gap: 10px;
    flex-direction: column;
  }
  .card-edit.open { display: flex; }
  .edit-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .edit-field { display: flex; flex-direction: column; gap: 4px; }
  .edit-save-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .edit-save-row .btn {
    padding: 10px;
    font-size: 12px;
  }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
    font-size: 13px;
    font-family: var(--mono);
  }

  /* 底部添加按钮 */
  .fab-area {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 12px 16px 24px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .fab {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    display: block;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .fab:active { transform: scale(0.97); opacity: 0.9; }

  /* 新建持仓抽屉 */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    padding: 20px 16px 40px;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 90vh;
    overflow-y: auto;
  }
  .drawer.open { transform: translateY(0); }
  .drawer-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .drawer-title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    font-weight: 700;
  }
  .drawer-fields {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* 代码建议 */
  .suggest-list {
    display: none;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 4px;
  }
  .suggest-list.open { display: flex; }
  .suggest-item {
    padding: 10px 14px;
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:active { background: var(--border); }
  .suggest-code {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    min-width: 70px;
  }
  .suggest-name { font-size: 13px; color: var(--text); }

  /* toast */
  .toast {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    z-index: 999;
    opacity: 0;
    transition: all 0.25s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.success { border-color: var(--accent2); color: var(--accent2); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* 加载中 */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .max-w { max-width: 480px; margin: 0 auto; }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 顶部栏 -->
<div class="topbar">
  <div class="topbar-title">▸ DS HOLDINGS</div>
  <div class="topbar-status" id="sync-status">未连接</div>
</div>

<!-- 认证界面 -->
<div id="auth-screen">
  <div class="auth-logo">X-DEEPSEEK WAVE SYSTEM</div>
  <div class="auth-title">持仓管理</div>
  <div class="auth-sub">输入 GitHub Token 和 Gist ID<br>数据存储在你的私有 Gist 中</div>

  <div>
    <div class="field-label">GITHUB TOKEN</div>
    <input type="password" id="input-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
  </div>
  <div>
    <div class="field-label">GIST ID</div>
    <input type="text" id="input-gist" placeholder="32位字符串" autocomplete="off">
  </div>
  <button class="btn btn-primary" onclick="doAuth()">连接</button>
  <div id="auth-err" style="font-size:12px;color:var(--danger);text-align:center;display:none"></div>
</div>

<!-- 主界面 -->
<div id="main-screen">
  <!-- 资产概览 -->
  <div class="overview max-w">
    <div class="overview-label">可用资金</div>
    <div class="overview-cash-edit">
      <div class="overview-cash" id="display-cash">—</div>
      <button class="cash-edit-btn" onclick="toggleCashEdit()" title="编辑">✎</button>
    </div>
    <div class="cash-input-row" id="cash-input-row">
      <input type="number" id="input-cash" placeholder="输入金额" step="0.01">
      <button class="btn btn-primary" onclick="saveCash()" style="width:auto;padding:8px 16px;font-size:12px;">保存</button>
      <button class="btn btn-ghost" onclick="toggleCashEdit()" style="width:auto;padding:8px 12px;font-size:12px;">取消</button>
    </div>
    <div class="overview-sub">
      <div class="overview-stat">
        <div class="overview-stat-label">持仓数</div>
        <div class="overview-stat-val" id="display-count">0</div>
      </div>
      <div class="overview-stat">
        <div class="overview-stat-label">最后同步</div>
        <div class="overview-stat-val" id="display-sync">—</div>
      </div>
    </div>
  </div>

  <!-- 持仓列表 -->
  <div class="max-w">
    <div class="section-header">
      <div class="section-title">ACTIVE POSITIONS</div>
      <div class="badge" id="holdings-badge">0</div>
    </div>
    <div id="holdings-list"></div>
  </div>

  <!-- FAB -->
  <div class="fab-area">
    <button class="fab" onclick="openDrawer()">＋ 买入建仓</button>
  </div>
</div>

<!-- 新建持仓抽屉 -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">▸ 买入 / 建仓</div>
  <div class="drawer-fields">
    <div>
      <div class="field-label">ETF 代码</div>
      <input type="text" id="new-symbol" placeholder="如 512480" inputmode="numeric"
             oninput="onSymbolInput(this.value)" autocomplete="off">
      <div class="suggest-list" id="suggest-list"></div>
    </div>
    <div class="edit-row">
      <div class="edit-field">
        <div class="field-label">数量（份）</div>
        <input type="number" id="new-qty" placeholder="100" inputmode="numeric" step="100">
      </div>
      <div class="edit-field">
        <div class="field-label">成本价</div>
        <input type="number" id="new-cost" placeholder="1.000" inputmode="decimal" step="0.001">
      </div>
    </div>
    <div>
      <div class="field-label">买入日期</div>
      <input type="date" id="new-date">
    </div>
    <div>
      <div class="field-label">备注（可选）</div>
      <input type="text" id="new-comment" placeholder="如：突破MA20买入">
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-primary" onclick="addHolding()" style="flex:1">确认买入</button>
      <button class="btn btn-ghost" onclick="closeDrawer()" style="width:auto;padding:14px 20px">取消</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ETF 池（与 ds_scanner.py 保持一致）
// ============================================================
const ETF_POOL = {
  'sh588000': '科创50ETF',
  'sh512480': '半导体ETF',
  'sh515880': '通信ETF',
  'sz159766': '旅游ETF',
  'sh515120': '创新药ETF',
  'sz159851': '金融科技',
  'sh512880': '证券ETF',
  'sz159915': '创业板ETF',
  'sh515030': '新能车ETF',
  'sz159755': '电池ETF',
  'sh515220': '煤炭ETF',
  'sh516150': '稀土ETF',
  'sh512400': '有色ETF',
  'sh516020': '化工ETF',
  'sh512690': '酒ETF',
  'sh513180': '恒生科技',
  'sh515790': '光伏ETF',
  'sh512660': '军工ETF',
};

// 纯数字代码 → 完整代码映射
const CODE_MAP = {};
for (const [full, name] of Object.entries(ETF_POOL)) {
  CODE_MAP[full.slice(2)] = { full, name };
}

// ============================================================
// 状态
// ============================================================
let TOKEN = '', GIST_ID = '', holdingsData = {};

// ============================================================
// 初始化
// ============================================================
window.onload = () => {
  TOKEN   = localStorage.getItem('ds_token') || '';
  GIST_ID = localStorage.getItem('ds_gist')  || '';
  // 设置今天日期
  document.getElementById('new-date').value = today();

  if (TOKEN && GIST_ID) {
    document.getElementById('input-token').value = TOKEN;
    document.getElementById('input-gist').value  = GIST_ID;
    loadData();
  }
};

function today() {
  return new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
}

// ============================================================
// 认证
// ============================================================
async function doAuth() {
  TOKEN   = document.getElementById('input-token').value.trim();
  GIST_ID = document.getElementById('input-gist').value.trim();
  const err = document.getElementById('auth-err');
  err.style.display = 'none';

  if (!TOKEN || !GIST_ID) {
    err.textContent = '请填写 Token 和 Gist ID';
    err.style.display = 'block';
    return;
  }
  localStorage.setItem('ds_token', TOKEN);
  localStorage.setItem('ds_gist',  GIST_ID);
  await loadData();
}

// ============================================================
// 读取 Gist
// ============================================================
async function loadData() {
  setStatus('加载中…', '');
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { Authorization: `token ${TOKEN}` }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const gist = await r.json();
    const raw = gist.files?.['holdings.json']?.content;
    if (!raw) throw new Error('Gist 中没有 holdings.json');
    holdingsData = JSON.parse(raw);
    // 兼容空文件
    if (!holdingsData.holdings) holdingsData.holdings = [];
    if (!holdingsData.cash_available) holdingsData.cash_available = 0;

    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    renderAll();
    setStatus('已同步', 'ok');
    document.getElementById('display-sync').textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    setStatus('连接失败', 'err');
    const err = document.getElementById('auth-err');
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

// ============================================================
// 写回 Gist
// ============================================================
async function saveData() {
  setStatus('同步中…', '');
  try {
    const content = JSON.stringify(holdingsData, null, 2);
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: {
        Authorization: `token ${TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { 'holdings.json': { content } } })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    setStatus('已同步', 'ok');
    document.getElementById('display-sync').textContent =
      new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    toast('✅ 已保存', 'success');
  } catch(e) {
    setStatus('同步失败', 'err');
    toast('❌ 保存失败: ' + e.message, 'error');
  }
}

// ============================================================
// 渲染
// ============================================================
function renderAll() {
  const active = holdingsData.holdings.filter(h => h.qty > 0);
  document.getElementById('display-cash').textContent =
    '¥ ' + Number(holdingsData.cash_available).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById('display-count').textContent = active.length;
  document.getElementById('holdings-badge').textContent = active.length;

  const list = document.getElementById('holdings-list');
  if (active.length === 0) {
    list.innerHTML = '<div class="empty-state">// 空仓中</div>';
    return;
  }

  list.innerHTML = active.map((h, idx) => {
    const fullIdx = holdingsData.holdings.indexOf(h);
    const info = CODE_MAP[h.symbol.slice(2)] || CODE_MAP[h.symbol];
    const name = info ? info.name : h.symbol;
    const displayCode = h.symbol.replace(/^(sh|sz)/, '');
    const prefix = h.symbol.startsWith('sh') ? 'SH' : 'SZ';
    const reduced = h.is_reduced ? ' <span style="color:var(--warn);font-size:10px">减仓</span>' : '';

    return `
    <div class="holding-card" id="card-${fullIdx}">
      <div class="card-main" onclick="toggleEdit(${fullIdx})">
        <div>
          <div class="card-code">${displayCode}</div>
          <div style="font-size:9px;color:var(--text2);text-align:center;margin-top:2px;font-family:var(--mono)">${prefix}</div>
        </div>
        <div class="card-info">
          <div class="card-name">${name}${reduced}</div>
          <div class="card-meta">${h.qty.toLocaleString()} 份 · 成本 ${h.cost} · ${h.buy_date}</div>
        </div>
        <div class="card-actions">
          <button class="card-btn card-btn-reduce" onclick="event.stopPropagation();openReduce(${fullIdx})">减仓</button>
          <button class="card-btn card-btn-close" onclick="event.stopPropagation();closePosition(${fullIdx})">清仓</button>
        </div>
      </div>
      <div class="card-edit" id="edit-${fullIdx}">
        <div class="edit-row">
          <div class="edit-field">
            <div class="field-label">数量</div>
            <input type="number" id="eq-${fullIdx}" value="${h.qty}" inputmode="numeric" step="100">
          </div>
          <div class="edit-field">
            <div class="field-label">成本价</div>
            <input type="number" id="ec-${fullIdx}" value="${h.cost}" inputmode="decimal" step="0.001">
          </div>
        </div>
        <div class="edit-field">
          <div class="field-label">买入日期</div>
          <input type="date" id="ed-${fullIdx}" value="${h.buy_date}">
        </div>
        <div class="edit-save-row">
          <button class="btn btn-primary" onclick="saveCard(${fullIdx})" style="flex:1">保存</button>
          <button class="btn btn-ghost" onclick="toggleEdit(${fullIdx})" style="width:auto;padding:10px 14px">取消</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleEdit(idx) {
  const el = document.getElementById(`edit-${idx}`);
  el.classList.toggle('open');
}

// ============================================================
// 资金编辑
// ============================================================
function toggleCashEdit() {
  const row = document.getElementById('cash-input-row');
  const showing = row.style.display === 'flex';
  row.style.display = showing ? 'none' : 'flex';
  if (!showing) {
    document.getElementById('input-cash').value = holdingsData.cash_available || '';
    document.getElementById('input-cash').focus();
  }
}
async function saveCash() {
  const val = parseFloat(document.getElementById('input-cash').value);
  if (isNaN(val) || val < 0) { toast('金额无效', 'error'); return; }
  holdingsData.cash_available = val;
  document.getElementById('cash-input-row').style.display = 'none';
  renderAll();
  await saveData();
}

// ============================================================
// 买入建仓
// ============================================================
function openDrawer() {
  document.getElementById('new-symbol').value = '';
  document.getElementById('new-qty').value = '';
  document.getElementById('new-cost').value = '';
  document.getElementById('new-date').value = today();
  document.getElementById('new-comment').value = '';
  document.getElementById('suggest-list').classList.remove('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  setTimeout(() => document.getElementById('new-symbol').focus(), 300);
}
function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function onSymbolInput(val) {
  const digits = val.replace(/\D/g, '');
  const list = document.getElementById('suggest-list');
  if (digits.length < 3) { list.classList.remove('open'); return; }

  const matches = Object.entries(ETF_POOL).filter(([code]) =>
    code.slice(2).startsWith(digits)
  );
  if (matches.length === 0) { list.classList.remove('open'); return; }

  list.innerHTML = matches.map(([code, name]) =>
    `<div class="suggest-item" onclick="selectSuggest('${code}','${name}')">
      <span class="suggest-code">${code}</span>
      <span class="suggest-name">${name}</span>
    </div>`
  ).join('');
  list.classList.add('open');
}

function selectSuggest(code, name) {
  document.getElementById('new-symbol').value = code.slice(2);
  document.getElementById('new-symbol').dataset.fullCode = code;
  document.getElementById('suggest-list').classList.remove('open');
  document.getElementById('new-qty').focus();
}

async function addHolding() {
  const rawSym  = document.getElementById('new-symbol').value.trim();
  const qty     = parseInt(document.getElementById('new-qty').value);
  const cost    = parseFloat(document.getElementById('new-cost').value);
  const date    = document.getElementById('new-date').value;
  const comment = document.getElementById('new-comment').value.trim();

  if (!rawSym) { toast('请输入代码', 'error'); return; }
  if (isNaN(qty) || qty <= 0) { toast('数量无效', 'error'); return; }
  if (isNaN(cost) || cost <= 0) { toast('成本价无效', 'error'); return; }
  if (!date) { toast('请选择日期', 'error'); return; }

  // 解析完整代码
  let symbol = document.getElementById('new-symbol').dataset.fullCode || '';
  if (!symbol) {
    const digits = rawSym.replace(/^(sh|sz)/i, '');
    if (CODE_MAP[digits]) {
      symbol = CODE_MAP[digits].full;
    } else if (/^(sh|sz)\d{6}$/i.test(rawSym)) {
      symbol = rawSym.toLowerCase();
    } else {
      toast('代码不在池内，请输入完整代码如 sh512480', 'error');
      return;
    }
  }

  // 检查是否已有该持仓（加仓）
  const existing = holdingsData.holdings.find(h => h.symbol === symbol && h.qty > 0);
  if (existing) {
    if (!confirm(`已有 ${symbol} 持仓，确认加仓？`)) return;
  }

  const entry = {
    symbol, qty, cost, buy_date: date,
    wave_type: '', is_reduced: false
  };
  if (comment) entry._comment = comment;

  holdingsData.holdings.push(entry);
  closeDrawer();
  renderAll();
  await saveData();
}

// ============================================================
// 减仓
// ============================================================
function openReduce(idx) {
  const h = holdingsData.holdings[idx];
  const newQty = prompt(`减仓 ${h.symbol}，当前 ${h.qty} 份\n请输入剩余份额：`);
  if (newQty === null) return;
  const qty = parseInt(newQty);
  if (isNaN(qty) || qty < 0 || qty >= h.qty) {
    toast('份额无效（须小于当前持仓且≥0）', 'error');
    return;
  }
  h.qty = qty;
  h.is_reduced = true;
  if (qty === 0) {
    holdingsData.holdings.splice(idx, 1);
  }
  renderAll();
  saveData();
}

// ============================================================
// 清仓
// ============================================================
function closePosition(idx) {
  const h = holdingsData.holdings[idx];
  if (!confirm(`确认清仓 ${h.symbol}？此操作将删除该记录。`)) return;
  holdingsData.holdings.splice(idx, 1);
  renderAll();
  saveData();
}

// ============================================================
// 保存卡片编辑
// ============================================================
async function saveCard(idx) {
  const qty  = parseInt(document.getElementById(`eq-${idx}`).value);
  const cost = parseFloat(document.getElementById(`ec-${idx}`).value);
  const date = document.getElementById(`ed-${idx}`).value;
  if (isNaN(qty) || isNaN(cost) || !date) { toast('数据无效', 'error'); return; }
  holdingsData.holdings[idx].qty = qty;
  holdingsData.holdings[idx].cost = cost;
  holdingsData.holdings[idx].buy_date = date;
  renderAll();
  await saveData();
}

// ============================================================
// 工具函数
// ============================================================
function setStatus(text, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = text;
  el.className = 'topbar-status ' + cls;
}

let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
}
</script>
</body>
</html>
