name: DS波段扫描

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python依赖
        run: pip install requests pandas akshare lxml beautifulsoup4

      - name: 运行扫描并保存报告
        run: |
          python ds_scanner.py
          echo "--- report.txt 前20行 ---"
          head -20 report.txt
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Bark推送报告
        run: python send_report.py
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
