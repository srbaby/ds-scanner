name: X-Plan波段扫描

# 定时触发已全面迁移至 Cloudflare Worker 内网服务绑定通道（Master-Scheduler ➔ ds-scan-trigger）
# 本工作流支持：CF Worker 自动远程唤醒 / 手机 GitHub App 手动触发
on:
  workflow_dispatch:           # 手动触发入口
  repository_dispatch:         # ✨ 新增：对接项目二 Worker 的内网穿透安全触发
    types: [scan]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境并启用缓存
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          # ✨ 新增：让缓存插件去扫描你的脚本文件，完美适配你的无依赖文件架构
          cache-dependency-path: |
            automation/ds_scanner.py
            automation/ai_review.py
            automation/gemini_review.py
            automation/generate_dashboard.py
            automation/policy_research/collect_policy_news.py
            automation/policy_research/extract_policy_events.py
            automation/policy_research/score_policy_delta.py
            automation/policy_research/compare_policy_decision.py
            automation/policy_research/run_policy_research.py
            automation/send_report.py
            automation/versioning.py
            VERSION.json

      - name: 安装Python依赖
        run: pip install requests pandas akshare lxml beautifulsoup4

      - name: 运行v3.1回归测试
        run: |
          node js/test_app.js
          PYTHONPATH=automation python -m unittest \
            automation/test_ds_scanner.py \
            automation/test_gemini_review.py \
            automation/test_generate_dashboard.py \
            automation/test_send_report.py \
            automation/test_versioning.py \
            automation/test_observe.py \
            automation/policy_research/test_policy_research.py

      - name: 运行扫描并保存报告
        run: |
          python automation/ds_scanner.py
          echo "--- report.txt 前20行 ---"
          head -20 report.txt
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}


      - name: 运行政策旁路观察（只写 dashboard 旁路数据）
        run: python automation/policy_research/run_policy_research.py
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        continue-on-error: true
      - name: 写入扫描器看板（不调用AI）
        run: python automation/generate_dashboard.py
        env:
          DS_SCANNER_GIST_ID: ${{ secrets.DS_SCANNER_GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          AI_PROVIDER: none
        # 看板写入失败不阻塞Bark；Bark可直接读取decision.json。
        continue-on-error: true

      - name: Bark推送报告
        run: python automation/send_report.py
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}

      - name: 扫描健康门禁（在Bark之后，仅让Actions历史诚实）
        if: always()
        run: |
          python -c "import json,sys; d=json.load(open('decision.json')); h=(d.get('portfolio') or {}).get('health','ok'); print('health=',h); sys.exit(1 if h!='ok' else 0)"
